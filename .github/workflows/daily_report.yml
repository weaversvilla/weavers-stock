name: Daily Stock Report

on:
  schedule:
    # 6:00 AM IST = 12:30 AM UTC
    - cron: '30 0 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI only

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only skip if this is a push triggered by Stock Bot commit (prevents infinite loop)
    # Allow: schedule, workflow_dispatch, and any non-bot push
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.actor != 'github-actions[bot]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run stock report
        env:
          BL_TOKEN: ${{ secrets.BL_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          SP_CLIENT_ID: ${{ secrets.SP_CLIENT_ID }}
          SP_CLIENT_SECRET: ${{ secrets.SP_CLIENT_SECRET }}
          SP_REFRESH_US: ${{ secrets.SP_REFRESH_US }}
          SP_REFRESH_UK: ${{ secrets.SP_REFRESH_UK }}
          SP_REFRESH_UAE: ${{ secrets.SP_REFRESH_UAE }}
        run: python python/daily_report.py

      - name: Commit velocity snapshot
        run: |
          git config --global user.name "Stock Bot"
          git config --global user.email "weavers.villa@gmail.com"
          git add python/velocity_history.csv python/stock_value_history.csv || true
          git diff --staged --quiet || git commit -m "Daily snapshot $(date +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
